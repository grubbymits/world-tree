<!DOCTYPE html>
<html>
<head>
<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
<meta name="viewport" content="width=device-width">
<meta name="description" content="Generating sprites in JS">
<title>Sprite Generator Demo</title>
</head>
<body>
  <script type="module">
  import * as WT from "/dist/world-tree.mjs";

  const width = 20;
  const depth = 20;
  const scale = 0.05;
  const H = 0.5;
  const octaves = 4;
  const numTerraces = 3;
  const offset_x = 1023;
  const offset_y = 990;

  window.onload = async (event) => {
    const heightMap = await WT.RepeatingIsometricNoiseGrid(width, depth, offset_x, offset_y, H, scale, octaves);
    const worldDescriptor = {
      canvasName: "demoCanvas",
      projection: "TwoByOneIsometric",
      heightMap: heightMap,
      numTerraces: numTerraces,
      hasRamps: true,
      defaultTerrainType: WT.TerrainType.DryGrass,
      biomeConfig: {
        waterLine: 0.1,
        rainfall: 50,
        rainDirection: WT.Direction.North,
        uplandThreshold: 4,
      },
      terrainSpriteDescriptor: {
        spriteWidth: 160,
        spriteHeight: 120,
        snowColour: '#D2D2CF',
        sandColour: '#B1B191',
        rockColour: '#ADAD9F',
        soilColour: '#836F49',
        grassColour: '#9DA17C',
        waterColour: '#5B80A4',
      },
    };
    const context = await WT.createWorld(worldDescriptor);
    const canvas = document.getElementById("demoCanvas");
    const camera = new WT.MouseCamera(
      context.scene,
      canvas,
      canvas.width,
      canvas.height,
    );

    const update = function() {
      if (document.hasFocus()) {
        context.update(camera);
      }
      window.requestAnimationFrame(update);
    };
    window.requestAnimationFrame(update);
  }
  </script>
  <div class="d-none d-sm-block">
    <canvas id="demoCanvas" oncontextmenu="return false;" width="1440" height="900">
  </div>
</body>
